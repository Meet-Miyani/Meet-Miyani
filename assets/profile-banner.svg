  <text x="56" y="220" fill="#D5E7F6" font-family="'Segoe UI','SF Pro Display','Helvetica Neue',Arial,sans-serif" font-size="26" font-weight="650">Android systems, codegen, and apps that ship.</text>
  <text x="56" y="248" fill="#5C86AA" font-family="'Segoe UI','SF Pro Text','Helvetica Neue',Arial,sans-serif" font-size="15.5">The interesting work starts after launch: foundations, contracts, UI architecture, and the hard edge cases.</text>

